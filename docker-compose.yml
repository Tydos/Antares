services:
  fastapi:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CI=false
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - fastapi
